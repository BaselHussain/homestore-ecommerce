openapi: 3.0.0
info:
  title: Order Detail API
  description: API endpoint to retrieve a specific order by ID for authenticated users
  version: 1.0.0
paths:
  /api/users/orders/{id}:
    get:
      summary: Get specific order details
      description: Retrieve a specific order by ID for the authenticated user
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Order details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  order:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "order_12345"
                      status:
                        type: string
                        enum: [Pending, Confirmed, Processing, Shipped, Delivered, Cancelled, Refunded]
                        example: "Delivered"
                      totalAmount:
                        type: number
                        example: 124.99
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            productId:
                              type: string
                              example: "prod_123"
                            name:
                              type: string
                              example: "Nordic Pine Shelf"
                            price:
                              type: number
                              example: 124.99
                            quantity:
                              type: integer
                              example: 1
                      shippingAddress:
                        type: object
                        properties:
                          street:
                            type: string
                            example: "123 Main St"
                          city:
                            type: string
                            example: "Anytown"
                          state:
                            type: string
                            example: "CA"
                          zipCode:
                            type: string
                            example: "12345"
                          country:
                            type: string
                            example: "USA"
                      trackingNumber:
                        type: string
                        example: "TRK-7823-4901"
                      createdAt:
                        type: string
                        format: date-time
                        example: "2026-01-15T10:30:00Z"
        '401':
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Authentication required"
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Order not found"
        '403':
          description: Forbidden - user does not have access to this order
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Access denied"
      security:
        - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT