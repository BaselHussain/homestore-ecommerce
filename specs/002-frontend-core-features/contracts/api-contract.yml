openapi: 3.0.0
info:
  title: Homestore Frontend API Client
  description: API contract for frontend client interactions with backend API
  version: 1.0.0

paths:
  /api/products:
    get:
      summary: Get all products
      description: Retrieve a list of all available products with optional search
      parameters:
        - name: search
          in: query
          description: Search term to filter products by name or description
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order (price_asc, price_desc, name_asc, name_desc)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '500':
          description: Server error

  /api/products/{id}:
    get:
      summary: Get product by ID
      description: Retrieve detailed information about a specific product
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                  price:
                    type: number
                  stock:
                    type: integer
                  category:
                    type: string
                  images:
                    type: array
                    items:
                      type: string
                  createdAt:
                    type: string
                  relatedProducts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
        '500':
          description: Server error

  /api/cart:
    get:
      summary: Get user's cart
      description: Retrieve all items in the user's cart
      responses:
        '200':
          description: Cart items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CartItem'
                  total:
                    type: number
        '500':
          description: Server error
    post:
      summary: Add item to cart
      description: Add a product to the user's cart with specified quantity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  description: ID of the product to add
                quantity:
                  type: integer
                  description: Number of items to add
              required:
                - productId
                - quantity
      responses:
        '200':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartItem'
        '400':
          description: Invalid input
        '404':
          description: Product not found
        '500':
          description: Server error

  /api/wishlist:
    get:
      summary: Get user's wishlist
      description: Retrieve all items in the user's wishlist
      responses:
        '200':
          description: Wishlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
        '500':
          description: Server error
    post:
      summary: Add item to wishlist
      description: Add a product to the user's wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  description: ID of the product to add
              required:
                - productId
      responses:
        '200':
          description: Item added to wishlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Invalid input
        '404':
          description: Product not found
        '500':
          description: Server error

  /api/orders:
    post:
      summary: Create a new order
      description: Create an order from the user's cart items (simulated checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input or cart empty
        '500':
          description: Server error

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          description: Unique product identifier
        name:
          type: string
          description: Product name
        description:
          type: string
          description: Product description
        price:
          type: number
          description: Price in USD
        stock:
          type: integer
          description: Available quantity in stock
        category:
          type: string
          description: Product category
        images:
          type: array
          items:
            type: string
          description: Array of image URLs
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp

    CartItem:
      type: object
      properties:
        id:
          type: string
          description: Unique cart item identifier
        productId:
          type: string
          description: Reference to the product
        quantity:
          type: integer
          description: Number of items
        addedAt:
          type: string
          format: date-time
          description: When added to cart

    WishlistItem:
      type: object
      properties:
        id:
          type: string
          description: Unique wishlist item identifier
        productId:
          type: string
          description: Reference to the product
        addedAt:
          type: string
          format: date-time
          description: When added to wishlist

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    OrderRequest:
      type: object
      properties:
        shippingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zip:
              type: string
            country:
              type: string
          required:
            - street
            - city
            - state
            - zip
            - country
      required:
        - shippingAddress

    Order:
      type: object
      properties:
        id:
          type: string
          description: Unique order identifier
        userId:
          type: string
          description: Reference to the user
        totalAmount:
          type: number
          description: Total order amount
        status:
          type: string
          description: Order status
          enum: [Pending, Confirmed, Processing, Shipped, Delivered, Cancelled, Refunded]
        shippingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zip:
              type: string
            country:
              type: string
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              name:
                type: string
              price:
                type: number
              quantity:
                type: integer
        createdAt:
          type: string
          format: date-time
          description: Order creation timestamp
      required:
        - id
        - userId
        - totalAmount
        - status
        - shippingAddress
        - items
        - createdAt